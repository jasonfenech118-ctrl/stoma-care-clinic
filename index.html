<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MDH Stoma Care Clinic — Roster</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
:root{
  --navy:#1a2e4a;--teal:#0d7377;--teal2:#14a085;--gold:#e6a817;
  --red:#c0392b;--green:#27ae60;--orange:#e67e22;--blue:#2980b9;
  --bg:#f0f2f5;--white:#fff;--border:#dde3ea;--text:#1a2e2d;--muted:#7a8fa6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}

#login-screen{min-height:100vh;background:linear-gradient(135deg,var(--navy),var(--teal));display:flex;align-items:center;justify-content:center;}
.lc{background:white;border-radius:16px;padding:44px 40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;}
.lc .ico{font-size:40px;margin-bottom:14px;}
.lc h1{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:4px;}
.lc p{color:var(--muted);font-size:13px;margin-bottom:28px;}
.lc input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;margin-bottom:10px;outline:none;}
.lc input:focus{border-color:var(--teal);}
.lc .btn-li{width:100%;padding:12px;background:var(--navy);color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.lc .btn-li:hover{background:var(--teal);}
.lerr{color:var(--red);font-size:12px;margin-top:8px;}

#app{display:none;min-height:100vh;}
.topbar{position:fixed;top:0;left:0;right:0;height:52px;background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.tb-logo{font-size:15px;font-weight:700;color:white;}.tb-logo span{color:var(--gold);}
.tb-date{font-size:12px;color:rgba(255,255,255,.55);margin-left:16px;}
.btn-so{padding:6px 14px;border:1px solid rgba(255,255,255,.3);border-radius:6px;color:rgba(255,255,255,.75);background:none;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-so:hover{background:rgba(255,255,255,.1);}
.tabs{position:fixed;top:52px;left:0;right:0;background:white;border-bottom:2px solid var(--border);display:flex;padding:0 24px;z-index:200;height:44px;box-shadow:0 2px 4px rgba(0,0,0,.05);overflow-x:auto;}
.tab{padding:0 16px;height:44px;display:flex;align-items:center;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap;}
.tab:hover{color:var(--navy);}
.tab.active{color:var(--navy);border-bottom-color:var(--teal);font-weight:600;}
.main{padding:100px 24px 40px;}
.page{display:none;animation:fi .2s ease;}
.page.active{display:block;}
@keyframes fi{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.phdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.phdr h2{font-size:20px;font-weight:700;color:var(--navy);}
.phdr p{font-size:12px;color:var(--muted);margin-top:3px;}
.btn-add{padding:8px 18px;background:var(--teal);color:white;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-add:hover{opacity:.85;}

/* LEGEND */
.legend{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px;padding:10px 14px;background:white;border-radius:8px;border:1px solid var(--border);}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.ld{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}
.dc-D{background:#1a2e4a;color:#fff;}.dc-R{background:#ecf0f1;color:#95a5a6;border:1px solid #d5d8dc;}
.dc-S{background:#c0392b;color:#fff;}.dc-M{background:#e91e8c;color:#fff;}
.dc-St{background:#2980b9;color:#fff;}.dc-OT{background:#e6a817;color:#fff;}
.dc-L{background:#27ae60;color:#fff;}.dc-TO{background:#0d7377;color:#fff;}.dc-TI{background:#14a085;color:#fff;}
.dc-O{background:transparent;color:#ddd;}

/* OT/TIL BARS */
.ot-bar{background:white;border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;}
.ot-field{display:flex;flex-direction:column;gap:4px;}
.ot-field label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.ot-field input{padding:7px 11px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;font-family:'Inter',sans-serif;outline:none;}
.ot-field input:focus{border-color:var(--teal);}
.btn-ot{padding:8px 18px;background:var(--gold);color:white;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;align-self:flex-end;}
.btn-til-off{padding:8px 18px;background:var(--teal);color:white;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;align-self:flex-end;}
.btn-til-in{padding:8px 18px;background:var(--navy);color:white;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;align-self:flex-end;margin-left:4px;}
.info-note{font-size:11px;color:var(--muted);padding:2px 4px 8px;}

/* MONTH NAV */
.mnav{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.mnav button{padding:6px 14px;border:1.5px solid var(--border);border-radius:7px;background:white;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;color:var(--navy);font-weight:500;}
.mnav button:hover{border-color:var(--teal);color:var(--teal);}
.mlbl{font-size:17px;font-weight:700;color:var(--navy);min-width:160px;}
.jump-section{display:flex;align-items:center;gap:6px;margin-left:16px;padding-left:16px;border-left:1px solid var(--border);}
.jump-section label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.jump-section input[type=date]{padding:6px 10px;border:1.5px solid var(--teal);border-radius:7px;font-size:12px;font-family:'Inter',sans-serif;outline:none;}
.jump-arrow{padding:5px 11px;border:1.5px solid var(--border);border-radius:7px;background:white;font-size:13px;font-weight:700;cursor:pointer;color:var(--navy);}
.jump-arrow:hover{border-color:var(--teal);color:var(--teal);}
.jump-clear{padding:6px 10px;border:1.5px solid var(--border);border-radius:7px;background:white;font-size:11px;font-family:'Inter',sans-serif;cursor:pointer;color:var(--muted);}

.roster-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);background:white;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.rt{border-collapse:collapse;min-width:100%;}
.rt thead tr th{padding:4px 3px;text-align:center;font-size:10px;font-weight:600;color:rgba(255,255,255,.85);background:var(--navy);border-right:1px solid rgba(255,255,255,.07);white-space:nowrap;position:sticky;top:0;z-index:10;line-height:1.3;}
.rt thead tr th.th-name{text-align:left;padding-left:16px;min-width:150px;font-size:11px;}
.rt thead tr th.th-role{text-align:left;padding-left:10px;min-width:120px;font-size:11px;}
.rt thead tr th.th-today{color:var(--gold);background:#1f3555;}
.rt thead tr th.th-hol{background:#1a3822;}
.rt thead tr th.th-sun{background:#1e2e40;color:rgba(255,255,255,.5);}
.rt thead tr th.th-sel{background:var(--teal);color:white;}
.rt tbody td{padding:5px 3px;text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border);vertical-align:middle;}
.rt tbody td.td-name{text-align:left;padding:9px 16px;font-weight:600;font-size:13px;border-right:1px solid var(--border);min-width:150px;white-space:nowrap;}
.rt tbody td.td-role{text-align:left;padding:9px 10px;font-size:11px;color:var(--muted);border-right:2px solid var(--border);min-width:120px;}
.rt tbody tr:hover td{background:#f8fafc;}
.rt tbody tr.sr td{background:#eef2f7;font-weight:700;font-size:10px;color:var(--navy);padding:6px 16px;letter-spacing:.6px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.rt tbody td.td-today{background:#fffce8!important;}
.rt tbody td.td-hol{background:#fff9e6!important;}
.rt tbody td.td-sun{background:#f7f9fb!important;}
.rt tbody td.td-sel{background:#e8f5f4!important;outline:2px solid var(--teal);outline-offset:-2px;}
.dchip{width:30px;height:30px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;cursor:pointer;transition:transform .12s;user-select:none;}
.dchip:hover{transform:scale(1.18);box-shadow:0 3px 8px rgba(0,0,0,.18);}

/* OT/TIL LISTS */
.ot-list-wrap{margin-top:16px;background:white;border-radius:12px;border:1px solid var(--border);box-shadow:0 2px 6px rgba(0,0,0,.05);overflow:hidden;}
.ot-list-hdr{background:var(--gold);color:white;padding:10px 16px;font-size:13px;font-weight:700;}
.til-list-wrap{margin-top:12px;background:white;border-radius:12px;border:1px solid var(--border);box-shadow:0 2px 6px rgba(0,0,0,.05);overflow:hidden;}
.til-list-hdr{background:var(--teal);color:white;padding:10px 16px;font-size:13px;font-weight:700;}
.ot-table{width:100%;border-collapse:collapse;}
.ot-table th{text-align:left;padding:9px 14px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--border);background:#fafafa;}
.ot-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);}
.ot-table tr:last-child td{border-bottom:none;}
.ot-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;background:#fff8e1;color:#856404;}
.til-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;background:#e8f5f4;color:var(--teal);}

/* PATIENT SNAPSHOT */
.pt-snap{margin-top:16px;background:white;border-radius:12px;border:1px solid var(--border);box-shadow:0 2px 6px rgba(0,0,0,.05);overflow:hidden;}
.pt-snap-hdr{background:var(--teal);color:white;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.pt-snap-nav{display:flex;align-items:center;gap:8px;}
.pt-snap-nav button{background:white;border:none;color:var(--teal);border-radius:6px;padding:4px 12px;cursor:pointer;font-size:12px;font-weight:700;}
.pt-snap-body{padding:14px 16px;}
.pt-snap-empty{font-size:13px;color:var(--muted);font-style:italic;}
.pt-count{background:white;color:var(--teal);border-radius:20px;padding:2px 12px;font-size:12px;font-weight:700;}
.pt-row{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);margin-bottom:8px;background:#fafafa;}
.pt-row:last-child{margin-bottom:0;}
.pt-slot{font-weight:700;color:var(--teal);font-size:13px;min-width:50px;}

/* APPOINTMENTS - MULTI-COLUMN */
.appt-date-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.appt-date-row label{font-size:13px;font-weight:600;color:var(--navy);}
.appt-date-row input[type=date]{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;outline:none;}
.sbadge{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:600;}
.sb-ok{background:#d4edda;color:#155724;}.sb-warn{background:#fff3cd;color:#856404;}.sb-none{background:#f8d7da;color:#721c24;}

/* CLINIC TABLE - multi nurse columns */
.clinic-wrap{background:white;border-radius:12px;border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.05);}
.clinic-hdr{background:var(--navy);color:white;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;}
.clinic-hdr h3{font-size:16px;font-weight:700;}.clinic-hdr span{font-size:11px;opacity:.65;}
.clinic-table{width:100%;border-collapse:collapse;}
.clinic-table th{padding:10px 12px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);border-bottom:2px solid var(--border);border-right:1px solid var(--border);background:#fafafa;white-space:nowrap;}
.clinic-table th.th-time{text-align:left;min-width:70px;color:var(--navy);}
.clinic-table th.th-nurse{color:var(--navy);min-width:200px;}
.clinic-table td{padding:8px 12px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);vertical-align:top;}
.clinic-table td.td-time{font-weight:700;color:var(--teal);font-size:13px;white-space:nowrap;background:#fafafa;}
.clinic-table tr:hover td{background:#f8fafc;}
.clinic-table tr:hover td.td-time{background:#f0f4f8;}

.nurse-cell-empty{color:var(--muted);font-size:12px;font-style:italic;text-align:center;padding:8px 0;}
.nurse-cell-booked{border-radius:8px;padding:8px 10px;background:#f0faf9;border:1px solid #c8e6e4;}
.ncb-name{font-weight:600;font-size:13px;color:var(--navy);}
.ncb-id{font-size:11px;color:var(--muted);}
.ncb-phone{font-size:11px;color:var(--muted);}
.ncb-actions{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;}
.ncb-btn{padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;border:none;font-family:'Inter',sans-serif;}
.ncb-attended{background:#d4edda;color:#155724;}
.ncb-dna{background:#fff3cd;color:#856404;}
.ncb-cancel{background:#f8d7da;color:#721c24;}
.ncb-del{background:#f8d7da;color:#721c24;}
.btn-book-nurse{width:100%;padding:7px;border:2px dashed var(--border);border-radius:7px;background:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;}
.btn-book-nurse:hover{border-color:var(--teal);color:var(--teal);}
.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:4px;}
.sb-booked{background:#e3f2fd;color:#0d47a1;}.sb-attended{background:#d4edda;color:#155724;}.sb-cancelled{background:#f8d7da;color:#721c24;}.sb-dna{background:#fff3cd;color:#856404;}

/* STAFF AUDIT */
.srow{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:18px;}
.sbox{background:white;border-radius:10px;padding:16px;border:1px solid var(--border);box-shadow:0 2px 4px rgba(0,0,0,.04);}
.sbox .sl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}
.sbox .sv{font-size:32px;font-weight:700;color:var(--navy);margin:4px 0 2px;}
.sbox .ss{font-size:11px;color:var(--muted);}
.filter-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.filter-row label{font-size:12px;font-weight:600;color:var(--navy);}
.filter-row select{padding:7px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;font-family:'Inter',sans-serif;outline:none;}
.filter-row input{padding:7px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;font-family:'Inter',sans-serif;outline:none;min-width:260px;}
.filter-row input:focus{border-color:var(--teal);}
.sort-btn{padding:7px 14px;border:1.5px solid var(--border);border-radius:7px;background:white;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;color:var(--navy);}

.card{background:white;border-radius:12px;border:1px solid var(--border);padding:20px;box-shadow:0 2px 6px rgba(0,0,0,.05);margin-bottom:16px;}
