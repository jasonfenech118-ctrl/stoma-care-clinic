<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MDH Surgical Staffing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --primary:#4f8fcf;--primary-dark:#2f6fae;--primary-soft:#eef7ff;--primary-border:#c9e2f7;
      --green:#2f8f5b;--green-soft:#eaf8f0;--green-border:#ccebd9;
      --red:#b85c5c;--red-soft:#fff0f0;--red-border:#f2cdcd;
      --amber:#b9852f;--amber-soft:#fff8e8;--amber-border:#f3dfad;
      --purple:#7a69c7;--purple-soft:#f3f0ff;--purple-border:#ddd6ff;
      --grey:#6f7d8d;--grey-soft:#f5f7fa;--grey-border:#e5eaf0;
      --bg:#f7fafd;--card:#ffffff;--text:#243142;--muted:#718096;--border:#e1e8f0;
      --shadow-soft:0 3px 12px rgba(55,94,130,.06);--radius:16px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;font-family:"Inter",Arial,Helvetica,sans-serif;
      background:linear-gradient(180deg,#f3f9ff 0%,#f8fbfd 260px,#f7fafd 100%);
      color:var(--text);font-size:14px;letter-spacing:-.01em;
    }

    header{
      background:rgba(255,255,255,.86);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;
      border-bottom:1px solid var(--border);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10;
    }

    .brand{display:flex;flex-direction:column;gap:3px}
    .brand-title{font-weight:800;font-size:19px;color:#1f3f5f;letter-spacing:-.03em}
    .brand-subtitle{font-size:12px;color:var(--muted);font-weight:500}
    .top-user{text-align:right;font-size:12px;line-height:1.45;color:var(--muted)}
    .top-user strong{color:var(--text);font-weight:700}

    .container{max-width:1600px;margin:18px auto;padding:0 12px}

    .card{
      background:rgba(255,255,255,.94);border:1px solid var(--border);border-radius:var(--radius);
      box-shadow:var(--shadow-soft);padding:18px;margin-bottom:16px;
    }

    .login-wrap{max-width:440px;margin:78px auto}

    h1,h2,h3{margin:0 0 12px;color:#223449;letter-spacing:-.04em}
    h1{font-size:25px;font-weight:800}
    h2{font-size:20px;font-weight:800}
    h3{font-size:16px;font-weight:800}

    label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700}

    input,select,textarea{
      width:100%;padding:10px 11px;border:1px solid var(--border);border-radius:12px;background:#fff;
      font-size:14px;outline:none;color:var(--text);font-family:inherit;
    }

    input:focus,select:focus,textarea:focus{
      border-color:var(--primary);box-shadow:0 0 0 4px rgba(79,143,207,.14);
    }

    button{
      border:0;border-radius:12px;padding:10px 15px;font-weight:800;cursor:pointer;
      background:var(--primary);color:#fff;font-family:inherit;box-shadow:0 4px 12px rgba(79,143,207,.20);
    }

    button:hover{background:var(--primary-dark)}
    button.secondary{background:#fff;color:var(--text);border:1px solid var(--border);box-shadow:none}
    button.secondary:hover{background:var(--grey-soft)}
    button.danger{background:var(--red)}
    button.success{background:var(--green)}
    button.small{padding:7px 10px;border-radius:10px;font-size:12px}
    button:disabled{opacity:.55;cursor:not-allowed}

    .grid{display:grid;gap:14px}
    .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

    .tabs{
      display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;background:rgba(255,255,255,.72);
      border:1px solid var(--border);border-radius:18px;padding:8px;box-shadow:var(--shadow-soft);
    }

    .tab{background:transparent;color:var(--muted);border:1px solid transparent;padding:10px 12px;box-shadow:none}
    .tab:hover{background:var(--primary-soft);color:var(--primary-dark);box-shadow:none}
    .tab.active{background:#fff;color:var(--primary-dark);border-color:var(--primary-border);box-shadow:0 4px 12px rgba(79,143,207,.10)}

    .stat-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
    .stat{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:var(--shadow-soft)}
    .stat-value{font-size:30px;font-weight:800;margin-bottom:5px;color:#1f3f5f;letter-spacing:-.05em}
    .stat-label{color:var(--muted);font-size:12px;font-weight:600}

    .badge{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800;white-space:nowrap;border:1px solid transparent}
    .badge.green{background:var(--green-soft);color:var(--green);border-color:var(--green-border)}
    .badge.red{background:var(--red-soft);color:var(--red);border-color:var(--red-border)}
    .badge.amber{background:var(--amber-soft);color:var(--amber);border-color:var(--amber-border)}
    .badge.blue{background:var(--primary-soft);color:var(--primary-dark);border-color:var(--primary-border)}
    .badge.purple{background:var(--purple-soft);color:var(--purple);border-color:var(--purple-border)}
    .badge.grey{background:var(--grey-soft);color:var(--grey);border-color:var(--grey-border)}

    .table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:16px;background:#fff;box-shadow:var(--shadow-soft)}
    table{width:100%;border-collapse:collapse;min-width:760px}
    th,td{padding:11px 12px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top;font-size:13px}
    th{background:#f9fbfd;color:#536273;font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:800}
    tr:last-child td{border-bottom:0}
    tbody tr:hover{background:#fbfdff}

    .muted{color:var(--muted)}
    .hidden{display:none!important}

    .error{background:var(--red-soft);color:var(--red);border:1px solid var(--red-border);padding:11px 13px;border-radius:12px;margin:10px 0;white-space:pre-wrap;font-weight:600}
    .success-msg{background:var(--green-soft);color:var(--green);border:1px solid var(--green-border);padding:11px 13px;border-radius:12px;margin:10px 0;font-weight:600}
    .info{background:var(--primary-soft);color:var(--primary-dark);border:1px solid var(--primary-border);padding:11px 13px;border-radius:12px;margin:10px 0;font-weight:600}

    .shift-cell{display:inline-flex;justify-content:center;align-items:center;min-width:30px;height:26px;border-radius:9px;font-weight:900;font-size:11px;border:1px solid transparent}
    button.shift-cell{padding:0;box-shadow:none;cursor:pointer}
    button.shift-cell:hover{filter:brightness(.97)}
    .shift-D,.shift-M,.shift-E{background:var(--primary-soft);color:var(--primary-dark);border-color:var(--primary-border)}
    .shift-N{background:#e7edff;color:#3857a6;border-color:#cfd9fb}
    .shift-O,.shift-R{background:var(--grey-soft);color:var(--grey);border-color:var(--grey-border)}
    .shift-AL{background:var(--amber-soft);color:var(--amber);border-color:var(--amber-border)}
    .shift-SL{background:var(--red-soft);color:var(--red);border-color:var(--red-border)}
    .shift-ML,.shift-ST{background:var(--purple-soft);color:var(--purple);border-color:var(--purple-border)}
    .shift-TI,.shift-TO,.shift-OT{background:var(--green-soft);color:var(--green);border-color:var(--green-border)}
    .override-dot{display:block;width:6px;height:6px;border-radius:999px;background:var(--red);margin:3px auto 0}

    .roster-hero h1{font-size:34px;margin-bottom:2px}
    .roster-controls{display:grid;grid-template-columns:1.4fr 1.4fr 1.4fr;gap:12px;margin-bottom:16px}
    .roster-control-box{background:#fff;border:1px solid var(--border);border-radius:16px;padding:14px;box-shadow:var(--shadow-soft)}
    .roster-nav{display:flex;align-items:end;gap:8px;flex-wrap:wrap}
    .mini-input{width:76px;padding:7px 8px;border-radius:9px}
    .wide-input{min-width:170px}

    .roster-table-card{
      margin-left:calc(50% - 50vw + 8px);
      margin-right:calc(50% - 50vw + 8px);
      padding:12px;
    }
    .roster-table-wrap{overflow-x:hidden}
    .roster-table{width:100%;min-width:100%;table-layout:fixed}
    .roster-table th,.roster-table td{padding:6px 2px;text-align:center;font-size:11px}
    .roster-table th:first-child,.roster-table td:first-child{
      width:220px;text-align:left;position:sticky;left:0;background:#fff;z-index:2;border-right:1px solid var(--border);
    }
    .roster-table th:first-child{background:#f9fbfd;z-index:3}
    .staff-sub{font-size:10.5px;color:var(--muted);font-weight:700;margin-top:3px;line-height:1.15}
    .roster-table td:first-child strong{display:block;white-space:normal;line-height:1.15}
    .day-head{display:flex;flex-direction:column;gap:2px;align-items:center;line-height:1.05;min-height:42px;justify-content:flex-start}
    .holiday-label{
      font-size:9.5px;
      color:var(--amber);
      font-weight:900;
      max-width:58px;
      overflow:visible;
      text-overflow:clip;
      white-space:normal;
      line-height:1.05;
      text-align:center;
      display:block;
    }
    .holiday-col{background:var(--amber-soft)!important}
    @media(max-width:1250px){
      .roster-table-wrap{overflow-x:auto}
      .roster-table{min-width:1250px}
      .roster-table th:first-child,.roster-table td:first-child{width:210px}
    }
    .today-col{outline:2px solid var(--green-border);outline-offset:-2px}
    .section-row td{background:#f6f9fc!important;color:#1f3f5f;font-weight:900;text-transform:uppercase;letter-spacing:.04em}
    .extra-summary-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
    .compact-table{min-width:900px}
    .compact-table th,.compact-table td{padding:9px 10px}

    .bar-list{display:grid;gap:10px}
    .bar-row{display:grid;grid-template-columns:170px 1fr 50px;gap:10px;align-items:center}
    .bar-label{font-weight:700;color:#3a4858;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .bar-track{height:12px;border-radius:999px;background:var(--grey-soft);border:1px solid var(--grey-border);overflow:hidden}
    .bar-fill{height:100%;border-radius:999px;background:var(--primary)}
    .bar-value{text-align:right;font-weight:800;color:#1f3f5f}


    .kpi-section-title{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:8px 0 10px}
    .chart-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:var(--shadow-soft);min-height:220px}
    .chart-title{font-weight:800;color:#223449;margin-bottom:6px}
    .chart-subtitle{font-size:12px;color:var(--muted);margin-bottom:12px}
    .donut-wrap{display:grid;grid-template-columns:150px 1fr;gap:14px;align-items:center}
    .donut{
      width:140px;height:140px;border-radius:50%;
      background:conic-gradient(var(--primary) 0deg 120deg,var(--green) 120deg 210deg,var(--amber) 210deg 280deg,var(--purple) 280deg 330deg,var(--red) 330deg 360deg);
      position:relative;margin:auto;border:1px solid var(--border);
    }
    .donut:after{content:"";position:absolute;inset:28px;background:#fff;border-radius:50%;border:1px solid var(--border)}
    .legend-list{display:grid;gap:7px}
    .legend-item{display:flex;justify-content:space-between;gap:8px;font-size:12px;color:#3a4858}
    .legend-dot{width:10px;height:10px;border-radius:999px;background:var(--primary);display:inline-block;margin-right:6px}
    .line-chart{width:100%;height:180px;border:1px solid var(--border);border-radius:14px;background:linear-gradient(180deg,#fff,#fbfdff);padding:10px}
    .mini-table{min-width:0}
    .mini-table th,.mini-table td{padding:8px 9px;font-size:12px}
    .wide-page-card{margin-left:calc(50% - 50vw + 16px);margin-right:calc(50% - 50vw + 16px);border-radius:0}

    @media(max-width:850px){
      .grid-2,.grid-3,.grid-4,.stat-grid,.roster-controls{grid-template-columns:1fr}
      header{align-items:flex-start;flex-direction:column}
      .top-user{text-align:left}
      .bar-row{grid-template-columns:1fr}
      .bar-value{text-align:left}
    }
  

    /* --- U-turn readability and compact layout overrides --- */
    .shift-cell{min-width:24px;height:22px;border-radius:7px;font-size:10px;line-height:1;padding:0 4px}
    button.shift-cell{min-width:24px;height:22px;padding:0 4px}
    .shift-L,.shift-AL{background:#fff3cf;color:#9a5b00;border-color:#f3cf75}
    .shift-LL{background:#f7e2d1;color:#7a351a;border-color:#d9a27d}
    .shift-N{background:#dfe6ff;color:#243b83;border-color:#bfcaf5}
    .shift-O{background:#f1f3f6;color:#586575;border-color:#d8dee8}
    .shift-R{background:#e2e8f0;color:#334155;border-color:#cbd5e1}
    .shift-TI{background:#e2f8d9;color:#236b31;border-color:#b7e8a9}
    .shift-TO{background:#dcfbf5;color:#0f766e;border-color:#a7f3df}
    .shift-OT{background:#d8f7e7;color:#146c43;border-color:#9ce0bd}
    .shift-SL{background:#ffe1e7;color:#a61b3d;border-color:#f5b5c4}
    .shift-ML{background:#f3e8ff;color:#6b21a8;border-color:#d8b4fe}
    .shift-ST{background:#ede9fe;color:#5b21b6;border-color:#c4b5fd}
    .roster-table-card{margin-left:calc(50% - 50vw + 6px);margin-right:calc(50% - 50vw + 6px);padding:8px;border-radius:12px}
    .roster-table-wrap{overflow-x:auto}
    .roster-table{width:100%;min-width:1060px;table-layout:fixed}
    .roster-table th,.roster-table td{padding:3px 1px;text-align:center;font-size:10px;line-height:1.05}
    .roster-table th:first-child,.roster-table td:first-child{width:185px;text-align:left;position:sticky;left:0;background:#fff;z-index:2;border-right:1px solid var(--border);padding:6px 8px}
    .roster-table th:first-child{background:#f9fbfd;z-index:3}
    .staff-name-line{display:block;font-weight:900;color:#1f2937;line-height:1.1;white-space:normal}
    .staff-role-line{display:block;font-size:10px;color:#536273;font-weight:800;margin-top:2px;line-height:1.05}
    .staff-shift-line{display:block;font-size:10px;color:#0f5f92;font-weight:900;margin-top:2px;line-height:1.05}
    .day-head{min-height:34px;gap:1px;font-size:9.5px}
    .holiday-label{font-size:8.5px;max-width:44px}
    .legend-compact{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px}
    .rp-toolbar{display:grid;grid-template-columns:1.25fr .75fr .9fr;gap:14px;align-items:end}
    .rp-filter-panel{background:#fbfdff;border:1px solid var(--border);border-radius:16px;padding:12px}
    .rp-day-nav{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;margin-top:12px}
    .rp-request-list{display:grid;gap:16px}
    .rp-card{background:#fff;border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow-soft);overflow:hidden}
    .rp-card-head{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;padding:16px 18px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#fbfdff,#fff)}
    .rp-title{font-size:18px;font-weight:900;color:#223449;letter-spacing:-.03em}
    .rp-subtitle{font-size:12px;color:var(--muted);font-weight:700;margin-top:4px;line-height:1.35}
    .rp-source-chip{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900;background:var(--primary-soft);color:var(--primary-dark);border:1px solid var(--primary-border);margin-top:8px}
    .rp-card-body{display:grid;grid-template-columns:1fr 1.1fr 1.35fr;gap:14px;padding:16px 18px}
    .rp-card-lower{display:grid;grid-template-columns:1.2fr 1fr;gap:14px;padding:0 18px 18px}
    .rp-box{border:1px solid var(--border);border-radius:16px;background:#fbfdff;padding:13px}
    .rp-box-title{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:#536273;font-weight:900;margin-bottom:10px;display:flex;justify-content:space-between;gap:8px}
    .rp-need-grid,.rp-alloc-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .rp-metric{background:#fff;border:1px solid var(--border);border-radius:14px;padding:10px;text-align:center}
    .rp-metric strong{display:block;font-size:22px;color:#1f3f5f;line-height:1;margin-bottom:5px}
    .rp-metric span{font-size:10.5px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.04em}
    .rp-shortage{margin-top:10px;font-size:12px;font-weight:900;padding:8px 10px;border-radius:12px}
    .rp-shortage.ok{color:var(--green);background:var(--green-soft);border:1px solid var(--green-border)}
    .rp-shortage.warn{color:var(--red);background:var(--red-soft);border:1px solid var(--red-border)}
    .rp-stepper{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:6px;margin-bottom:12px}
    .rp-step{border:1px solid var(--border);border-radius:14px;padding:8px 5px;background:#fff;text-align:center;min-height:60px}
    .rp-step .dot{width:13px;height:13px;border-radius:999px;background:#d8e1ea;margin:0 auto 5px;border:2px solid #fff;box-shadow:0 0 0 1px var(--border)}
    .rp-step.done{background:var(--green-soft);border-color:var(--green-border);color:var(--green)}
    .rp-step.done .dot{background:var(--green);box-shadow:0 0 0 1px var(--green)}
    .rp-step.current{background:var(--primary-soft);border-color:var(--primary-border);color:var(--primary-dark)}
    .rp-step.current .dot{background:var(--primary);box-shadow:0 0 0 1px var(--primary)}
    .rp-step-label{font-size:9.5px;font-weight:900;line-height:1.1}
    .rp-workflow-section{display:grid;gap:10px}
    .rp-action-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;background:#fff;border:1px solid var(--border);border-radius:14px;padding:10px}
    .rp-action-title{font-size:13px;font-weight:900;color:#223449;line-height:1.2}
    .rp-action-help{font-size:11px;color:var(--muted);font-weight:650;line-height:1.25;margin-top:2px}
    .rp-action-row button{min-width:150px;white-space:normal;line-height:1.12}
    .rp-danger-zone{display:flex;justify-content:flex-end;margin-top:10px}
    .rp-timestamps{display:grid;gap:6px;font-size:11.5px;color:#536273;font-weight:650}
    .rp-timestamps div{display:grid;grid-template-columns:150px 1fr;gap:10px;border-bottom:1px dashed #e1e8f0;padding-bottom:5px}
    .rp-timestamps div:last-child{border-bottom:0;padding-bottom:0}
    .rp-timestamps strong{color:#243142;text-align:right}
    .rp-notes{margin-top:10px}
    .rp-notes textarea{min-height:72px;resize:vertical}
    .rp-verification-log{display:grid;gap:7px;max-height:170px;overflow:auto}
    .rp-verification-entry{background:#fff;border:1px solid var(--border);border-radius:12px;padding:8px;font-size:12px;line-height:1.3}
    .rp-verification-entry strong{display:block;color:#223449;margin-bottom:2px}
    .rp-fallback-panel{margin-top:10px;border:1px dashed var(--amber-border);background:var(--amber-soft);border-radius:14px;padding:10px}
    .rp-fallback-panel label{color:#7a541b}
    .rp-fallback-grid{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end}

    @media(max-width:1250px){.roster-table{min-width:1060px}.roster-table th:first-child,.roster-table td:first-child{width:180px}.rp-toolbar{grid-template-columns:1fr}.rp-day-nav{justify-content:flex-start}.rp-card-body,.rp-card-lower{grid-template-columns:1fr}.rp-stepper{grid-template-columns:repeat(3,minmax(0,1fr))}.rp-action-row{grid-template-columns:1fr}.rp-action-row button{width:100%;min-width:0}.rp-timestamps div{grid-template-columns:1fr}.rp-timestamps strong{text-align:left}}
    @media(max-width:700px){.rp-card-head{grid-template-columns:1fr}.rp-need-grid,.rp-alloc-grid{grid-template-columns:1fr 1fr 1fr}.rp-toolbar{gap:8px}.rp-box{padding:10px}.rp-card-body,.rp-card-lower{padding:10px}.rp-card-head{padding:12px}.rp-stepper{grid-template-columns:repeat(2,minmax(0,1fr));gap:5px}.rp-step{padding:7px 3px;min-height:52px}.rp-step-label{font-size:9px}.rp-fallback-grid{grid-template-columns:1fr}.rp-action-row{padding:9px}}

    .today-col{box-shadow:inset 0 0 0 2px #40b37d;outline:none!important}
    .holiday-label{font-size:9px;color:#ffd36a;font-weight:900;max-width:54px;white-space:normal;line-height:1.05;text-align:center}
    .staff-name-line{display:block;font-weight:900;color:#162336;font-size:12px;line-height:1.08;white-space:normal}
    .staff-role-line{display:block;font-size:10px;color:#586575;font-weight:800;margin-top:3px;line-height:1.05}

    @media(max-width:1250px){.rp-v10-summary-head.rp-v12-summary-head{grid-template-columns:1fr!important}.rp-v13-control-sentence{grid-template-columns:1fr 1fr 1fr;}.rp-v10-ward-summary-grid{grid-template-columns:repeat(3,minmax(0,1fr))!important}.rp-v13-audit{grid-template-columns:repeat(2,minmax(0,1fr))}.rp-v8-grid{grid-template-columns:1fr!important}}
    @media(max-width:700px){.rp-v13-control-sentence{grid-template-columns:1fr!important}.rp-v10-ward-summary-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important}.rp-v13-audit{grid-template-columns:1fr}.rp-v8-stats{grid-template-columns:repeat(2,minmax(0,1fr))!important}}

<body>
  <header>
    <div class="brand">
      <div class="brand-title">MDH Surgical Staffing</div>
      <div class="brand-subtitle">Surgical wards staffing report system</div>
    </div>
    <div class="top-user" id="topUser">Not signed in</div>
  </header>

  <main class="container">
    <section id="loginScreen" class="login-wrap">
      <div class="card">
        <h1>Sign in</h1>
        <p class="muted">Use the Supabase test accounts created for this project.</p>
        <div id="loginMessage"></div>
        <div class="grid">
          <div><label>Email</label><input id="loginEmail" type="email" autocomplete="username" placeholder="name@example.com" /></div>
          <div><label>Password</label><input id="loginPassword" type="password" autocomplete="current-password" placeholder="Password" /></div>
          <button type="button" onclick="signIn()">Sign in</button>
        </div>
      </div>
    </section>

    <section id="appScreen" class="hidden">
      <div class="card">
        <div class="actions" style="justify-content:space-between">
          <div><h1 id="mainTitle">Dashboard</h1><div class="muted" id="mainSubtitle"></div></div>
          <div class="actions">
            <button class="secondary" type="button" onclick="reloadCurrentTab()">Refresh</button>
            <button class="danger" type="button" onclick="signOut()">Sign out</button>
          </div>
        </div>
      </div>
      <div class="tabs" id="tabs"></div>
      <div id="message"></div>
      <div id="content"></div>
    </section>
  </main>

  <script>
    const SUPABASE_URL_RAW = "https://dedcykelhdqwktkmkeiv.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_mdp0ij0wBpGmqwWnDtNKHA_TF1zNzvw";
    const SUPABASE_URL = SUPABASE_URL_RAW.replace(/\/rest\/v1\/?$/i, "").replace(/\/$/i, "");
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Emergency diagnostics: prevent a blank white dashboard if a runtime error occurs.
    function emergencyShowError(message){
      const msg = String(message || "Unknown app error");
      console.error(msg);
      const login = document.getElementById("loginScreen");
      const app = document.getElementById("appScreen");
      const target = document.getElementById("message") || document.getElementById("loginMessage");
      if(app) app.classList.remove("hidden");
      if(login) login.classList.add("hidden");
      if(target) target.innerHTML = `<div class="error">App error: ${escapeHtml(msg)}</div>`;
    }

    window.addEventListener("error", event => emergencyShowError(event.message || event.error));
    window.addEventListener("unhandledrejection", event => emergencyShowError(event.reason?.message || event.reason));

    let appState = {
      session:null,
      ref:null,
      profile:null,
      wards:[],
      activeTab:null,
      selectedWardId:null,
      selectedOverviewWardId:"",
      selectedRelievingWardId:"",
      selectedDate:todayISO(),
      selectedMonth:monthISO(new Date()),
      selectedAuditWardId:"",
      selectedKpiStaffId:"",
      staffRows:[],
      monthlyRosterRows:[],
      monthlyExtraRows:[]
    };

    document.addEventListener("DOMContentLoaded", async () => {
      const { data } = await sb.auth.getSession();
      appState.session = data.session;
      sb.auth.onAuthStateChange((_event, session) => { appState.session = session; boot(); });
      await boot();
    });

    async function boot(){
      clearMessage();
      if(!appState.session){ showLogin(); return; }
      await loadReferenceData();
      showApp();
    }

    function showLogin(){
      document.getElementById("loginScreen").classList.remove("hidden");
      document.getElementById("appScreen").classList.add("hidden");
      document.getElementById("topUser").textContent = "Not signed in";
    }

    function showApp(){
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("appScreen").classList.remove("hidden");

      const p = appState.profile;
      if(!p){
        showError("Login succeeded, but no staff profile was returned for this account. Check the staff/user profile link in Supabase.");
        document.getElementById("topUser").textContent = "Signed in — no profile returned";
        document.getElementById("mainTitle").textContent = "Dashboard";
        document.getElementById("mainSubtitle").textContent = "Profile missing";
        return;
      }

      document.getElementById("topUser").innerHTML = `<strong>${escapeHtml(p.full_name || p.email || "Signed in")}</strong><br>${labelRole(p.role)}`;
      document.getElementById("mainTitle").textContent = p.is_sno ? "Senior Nursing Officer Dashboard" : "Ward Dashboard";
      document.getElementById("mainSubtitle").textContent = p.is_sno ? "All surgical wards overview" : wardAccessLabel();

      const validTabs = getTabs().map(t => t[0]);
      if(!appState.activeTab || !validTabs.includes(appState.activeTab)){
        appState.activeTab = p.is_sno ? "snoOverview" : "wardDaily";
      }

      buildTabs();
      renderTab(appState.activeTab);
    }

    async function loadReferenceData(){
      const { data, error } = await sb.rpc("get_app_reference_data");
      if(error){
        showError("Could not load app reference data: " + error.message);
        throw error;
      }

      let refData = data;
      if(typeof refData === "string"){
        try{ refData = JSON.parse(refData); }catch(_err){}
      }
      if(Array.isArray(refData)){
        const first = refData[0] || {};
        refData = first.get_app_reference_data || first.result || first.data || first;
      }
      if(!refData || typeof refData !== "object"){
        throw new Error("get_app_reference_data did not return a usable object.");
      }

      appState.ref = refData || {};
      appState.profile = appState.ref.profile || appState.ref.user_profile || appState.ref.current_profile || null;

      if(!appState.profile){
        throw new Error("No user profile returned by get_app_reference_data. The app cannot decide whether to show the SNO dashboard or ward dashboard.");
      }

      const rawWards = appState.ref.accessible_wards || appState.ref.wards || [];
      appState.wards = rawWards.map(w => ({
        ward_id:w.ward_id || w.id,
        ward_code:w.ward_code || w.code || "",
        ward_name:w.ward_name || w.name || ""
      })).filter(w => w.ward_id);

      if(appState.wards.length > 0){
        const stillValid = appState.wards.some(w => w.ward_id === appState.selectedWardId);
        if(!appState.selectedWardId || !stillValid) appState.selectedWardId = appState.wards[0].ward_id;
      }
    }

    function getTabs(){
      if(appState.profile?.is_sno){
        return [
          ["snoOverview","Today’s Overview"],
          ["monthlyRoster","Monthly Roster"],
          ["staffManagement","Staff Management"],
          ["relievingPool","Relieving Pool"],
          ["auditVisuals","Audit KPIs"],
          ["auditHistory","Audit History"],
          ["myAccount","My Account"]
        ];
      }

      return [
        ["wardDaily","Daily Staffing"],
        ["monthlyRoster","Monthly Roster"],
        ["staffManagement","My Ward Staff"],
        ["myAccount","My Account"]
      ];
    }

    function buildTabs(){
      document.getElementById("tabs").innerHTML = getTabs().map(([key,label]) =>
        `<button type="button" class="tab ${appState.activeTab===key?"active":""}" onclick="renderTab('${key}')">${label}</button>`
      ).join("");
    }

    async function renderTab(tabKey){
      appState.activeTab = tabKey;
      buildTabs();
      clearMessage();
      document.getElementById("content").innerHTML = `<div class="card"><p class="muted">Loading...</p></div>`;

      try{
        if(tabKey==="snoOverview") await renderSnoOverview();
        else if(tabKey==="wardDaily") await renderWardDaily();
        else if(tabKey==="monthlyRoster") await renderMonthlyRoster();
        else if(tabKey==="staffManagement") await renderStaffManagement();
        else if(tabKey==="relievingPool") await renderRelievingPool();
        else if(tabKey==="auditVisuals") await renderAuditVisuals();
        else if(tabKey==="auditHistory") await renderAuditHistory();
        else if(tabKey==="myAccount") await renderMyAccount();
      }catch(err){
        showError(err.message || String(err));
      }
    }

    function reloadCurrentTab(){ renderTab(appState.activeTab); }

    async function signIn(){
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      setLoginMessage("");
      if(!email || !password){ setLoginMessage(`<div class="error">Enter email and password.</div>`); return; }
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if(error){ setLoginMessage(`<div class="error">${escapeHtml(error.message)}</div>`); return; }
    }

    async function signOut(){
      await sb.auth.signOut();
      appState = {
        session:null,ref:null,profile:null,wards:[],activeTab:null,selectedWardId:null,
        selectedDate:todayISO(),selectedMonth:monthISO(new Date()),selectedOverviewWardId:"",selectedRelievingWardId:"",selectedAuditWardId:"",selectedKpiStaffId:"",
        staffRows:[],monthlyRosterRows:[],monthlyExtraRows:[]
      };
      showLogin();
    }

    async function renderSnoOverview(){
      const date = appState.selectedDate;
      const selectedWardFilter = appState.selectedOverviewWardId || "";
      const { data, error } = await sb.rpc("get_sno_daily_overview", { p_staffing_date: date });
      if(error) throw error;

      const rawRows = data || [];
      const rowsByWardId = new Map();
      const rowsByWardCode = new Map();
      rawRows.forEach(r => {
        if(r.ward_id) rowsByWardId.set(String(r.ward_id), r);
        if(r.ward_code) rowsByWardCode.set(String(r.ward_code), r);
      });

      let rows = appState.wards.map(w => {
        const found = rowsByWardId.get(String(w.ward_id)) || rowsByWardCode.get(String(w.ward_code));
        return found || {
          ward_id:w.ward_id,
          ward_code:w.ward_code,
          ward_name:w.ward_name,
          ward_status:"not_submitted",
          required_nurses:0,
          required_carers:0,
          present_nurses:0,
          present_carers:0,
          present_healthcare_assistants:0,
          sick_total:0,
          leave_total:0,
          til_out_total:0,
          total_shortage:0
        };
      });

      if(!rows.length) rows = rawRows;
      if(selectedWardFilter) rows = rows.filter(r => String(r.ward_id || "") === String(selectedWardFilter));

      const total = rows.length;
      const full = rows.filter(r=>r.ward_status==="fully_staffed").length;
      const short = rows.filter(r=>r.ward_status==="short_staffed").length;
      const not = rows.filter(r=>r.ward_status==="not_submitted" || !r.ward_status).length;

      document.getElementById("content").innerHTML = `
        <div class="card">
          <div class="actions" style="justify-content:space-between;align-items:flex-end">
            <div><h2>Today’s Overview</h2><p class="muted">All wards must submit daily staffing by 07:00.</p></div>
            <div class="actions" style="align-items:flex-end">
              ${overviewWardSelectorHtml()}
              <div><label>Date</label><input type="date" value="${date}" onchange="setSelectedDate(this.value)"></div>
            </div>
          </div>
        </div>

        <div class="stat-grid">
          ${statCard(total,"Total wards")}
          ${statCard(full,"Fully staffed")}
          ${statCard(short,"Short staffed")}
          ${statCard(not,"Not submitted")}
        </div>

        <div class="grid grid-3">
          ${rows.map(r=>`
            <div class="card">
              <div class="actions" style="justify-content:space-between"><h3>${escapeHtml(r.ward_code || "—")}</h3>${wardStatusBadge(r.ward_status || "not_submitted")}</div>
              <p class="muted">${escapeHtml(r.ward_name || "")}</p>
              <table style="min-width:0">
                <tr><td>Required nurses</td><td><strong>${numberValue(r.required_nurses)}</strong></td></tr>
                <tr><td>Required carers/aides</td><td><strong>${numberValue(r.required_carers)}</strong></td></tr>
                <tr><td>Present nurses</td><td><strong>${numberValue(r.present_nurses)}</strong></td></tr>
                <tr><td>Present carers/aides</td><td><strong>${numberValue(r.present_carers) + numberValue(r.present_healthcare_assistants)}</strong></td></tr>
                <tr><td>Sick</td><td><strong>${numberValue(r.sick_total)}</strong></td></tr>
                <tr><td>Leave</td><td><strong>${numberValue(r.leave_total)}</strong></td></tr>
                <tr><td>Shortage</td><td><strong>${numberValue(r.total_shortage)}</strong></td></tr>
              </table>
            </div>
          `).join("") || `<div class="card"><p class="muted">No wards returned for this account.</p></div>`}
        </div>`;
    }

    async function renderWardDaily(){
      const wardId = requireSelectedWard();
      const date = appState.selectedDate;

      const [summaryResult, rosterResult] = await Promise.all([
        sb.rpc("get_ward_daily_dashboard", { p_ward_id: wardId, p_staffing_date: date }),
        sb.rpc("get_my_ward_roster_between", { p_ward_id: wardId, p_start_date: date, p_end_date: date })
      ]);

      if(summaryResult.error) throw summaryResult.error;
      if(rosterResult.error) throw rosterResult.error;

      const s = (summaryResult.data || [])[0];
      const roster = rosterResult.data || [];
      const w = selectedWard();

      if(!s){
        document.getElementById("content").innerHTML = `<div class="card"><div class="info">No dashboard summary returned for this ward/date.</div></div>`;
        return;
      }

      document.getElementById("content").innerHTML = `
        <div class="card">
          <div class="actions" style="justify-content:space-between">
            <div>
              <h2>Ward Dashboard</h2>
              <h1 style="margin-bottom:4px">${escapeHtml(w?.ward_name || s.ward_name || s.ward_code)}</h1>
              <p class="muted">${escapeHtml(formatDate(date))}</p>
            </div>
            <div class="actions">${wardSelectorHtml()}<div><label>Date</label><input type="date" value="${date}" onchange="setSelectedDate(this.value)"></div></div>
          </div>
        </div>

        <div class="stat-grid">
          ${statCard(numberValue(s.present_nurses)+numberValue(s.present_carers)+numberValue(s.present_healthcare_assistants),"Present")}
          ${statCard(numberValue(s.absent_total),"Absent / Off / Leave")}
          ${statCard(numberValue(s.sick_total),"Sick")}
          ${statCard(numberValue(s.til_out_total),"TIL out")}
        </div>

        <div class="card">
          <div class="actions" style="justify-content:space-between">
            <div>
              <h3>Establishment</h3>
              <p class="muted">Required: ${numberValue(s.required_nurses)} nurses + ${numberValue(s.required_carers)} carers/HCAs. Nurse shortage: ${numberValue(s.nurse_shortage)}. Carer/HCA shortage: ${numberValue(s.carer_hca_shortage)}.</p>
            </div>
            <button class="success" type="button" onclick="submitDailyStaffing()">Submit to SNO and Nurse HR</button>
          </div>
        </div>

        <div class="card">
          <h3>Staff rows</h3>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Staff</th><th>Role</th><th>Baseline</th><th>Live</th><th>Reason</th></tr></thead>
              <tbody>
                ${roster.map(r=>`
                  <tr>
                    <td>${escapeHtml(cleanStaffName(r.full_name))}</td>
                    <td>${escapeHtml(labelRole(r.role))}</td>
                    <td>${shiftBadge(r.baseline_shift_code)}</td>
                    <td>${shiftButton(r.staff_id, r.shift_date, r.live_shift_code, r.source_type==="override")}</td>
                    <td>${escapeHtml(r.override_reason||"")}</td>
                  </tr>
                `).join("") || `<tr><td colspan="5" class="muted">No staff rows found.</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>`;
    }

    async function submitDailyStaffing(){
      clearMessage();
      const { error } = await sb.rpc("create_daily_staffing_submission", {
        p_ward_id: appState.selectedWardId,
        p_staffing_date: appState.selectedDate,
        p_submitted_by_staff_id: null,
        p_notes: "Submitted from frontend"
      });
      if(error){ showError(error.message); return; }
      showSuccess("Daily staffing submitted to SNO and Nurse HR workflow.");
      await renderWardDaily();
    }

    async function renderMonthlyRoster(){
      const wardId = requireSelectedWard();
      const monthValue = appState.selectedMonth;
      const { start, end, days } = monthRange(monthValue);
      const selectedW = selectedWard();

      const [rosterResult, holidayResult] = await Promise.all([
        sb.rpc("get_my_ward_roster_between", { p_ward_id: wardId, p_start_date: start, p_end_date: end }),
        sb.rpc("get_malta_public_holidays", { p_start_date: start, p_end_date: end })
      ]);

      if(rosterResult.error) throw rosterResult.error;
      if(holidayResult.error) throw holidayResult.error;

      const grouped = groupRosterByStaff(rosterResult.data || []);
      const holidays = holidayResult.data || [];

      appState.monthlyRosterRows = grouped;
      appState.monthlyExtraRows = [];

      const holidayMap = {};
      for(const h of holidays) holidayMap[h.holiday_date] = h;

      document.getElementById("content").innerHTML = `
        <div class="card roster-hero">
          <div class="actions" style="justify-content:space-between;align-items:flex-start">
            <div>
              <h2>Monthly Roster</h2>
              <h1>${escapeHtml(selectedW?.ward_name || "Selected Ward")}</h1>
              <p class="muted">${escapeHtml(selectedW?.ward_code || "")} · ${escapeHtml(monthLabel(monthValue))} · Click any shift cell to change status</p>
            </div>
            <div class="roster-nav">

    function normaliseRosterCode(code){
      const raw = String(code || "").trim().toUpperCase();
      if(!raw || raw === "—" || raw === "-") return "";
      const aliases = {
        A:"L", AL:"L", ANNUAL:"L", ANNUAL_LEAVE:"L", LEAVE:"L",
        S:"SL", SICK:"SL", SICK_LEAVE:"SL",
        MATERNITY:"ML", MATERNITY_LEAVE:"ML",
        STUDY:"ST", STUDY_LEAVE:"ST",
        TILIN:"TI", TIL_IN:"TI",
        TILOUT:"TO", TIL_OUT:"TO",
        OVERTIME:"OT", LONG_LEAVE:"LL"
      };
      return aliases[raw] || raw;
    }

    function storeRosterCode(code){
      const clean = normaliseRosterCode(code);
      return clean;
    }

    function openShiftPicker(staffId, shiftDate, currentCode){
      clearMessage();
      const staff = findMonthlyStaff(staffId);
      const cleanCurrent = normaliseRosterCode(currentCode || "");
      shiftPickerState = {
        staffId,
        shiftDate,
        currentCode: cleanCurrent,
        selectedCode: cleanCurrent && cleanCurrent !== "LL" ? cleanCurrent : "D"
      };

      const modal = ensureShiftPickerModal();
      const staffName = cleanStaffName(staff?.full_name || "Staff member");
      const role = labelRole(staff?.role || "");
      document.getElementById("shiftPickerTitle").textContent = "Update Shift";
      document.getElementById("shiftPickerSubtitle").innerHTML = `${escapeHtml(staffName)}${role ? ` — ${escapeHtml(role)}` : ""}<br>${escapeHtml(formatDate(shiftDate))}`;
      document.getElementById("shiftPickerNotes").value = "";

    function renderShiftPickerChoices(){
      const selected = shiftPickerState?.selectedCode || "";
      document.getElementById("shiftChoiceGrid").innerHTML = SHIFT_PICKER_CHOICES.map(choice => `
        <button type="button" class="shift-choice-btn ${choice.code === selected ? "active" : ""}" onclick="selectShiftPickerCode('${escapeHtml(choice.code)}')">

    function closeShiftPickerModal(){
      const modal = document.getElementById("shiftPickerBackdrop");
      if(modal) modal.classList.add("hidden");
      shiftPickerState = null;
    }

    async function saveShiftPickerModal(){
      if(!shiftPickerState){ closeShiftPickerModal(); return; }
      const state = shiftPickerState;
      const chosen = normaliseRosterCode(state.selectedCode);
      const current = normaliseRosterCode(state.currentCode);
      const notes = document.getElementById("shiftPickerNotes")?.value?.trim() || null;

      if(!chosen){ showError("Choose a shift/status value."); return; }
      if(chosen === "LL"){
        showError("Long Leave is automatic. Select Leave/TIL/Overtime and the system will display LL after 3 consecutive days.");
        return;
      }

      const allowed = new Set(SHIFT_PICKER_CHOICES.map(x => x.code));
      if(!allowed.has(chosen)){
        showError("Invalid shift/status value.");
        return;
      }

      closeShiftPickerModal();
      if(chosen === current) return;

      const storedCode = storeRosterCode(chosen);
      const { error } = await sb.rpc("upsert_ward_roster_override", {
        p_ward_id: appState.selectedWardId,
        p_staff_id: state.staffId,
        p_shift_date: state.shiftDate,
        p_shift_code: storedCode,
        p_override_reason: reasonForShift(storedCode),
        p_notes: notes
      });

      if(error){ showError(error.message); return; }

      showSuccess("Roster status updated.");
      if(appState.activeTab === "wardDaily") await renderWardDaily();
      else await renderMonthlyRoster();
    }

    async function renderRelievingPool(){
      if(!appState.profile.is_sno){
        document.getElementById("content").innerHTML = `<div class="card"><div class="info">Relieving Pool management is SNO-only. Ward users submit daily staffing; the SNO reviews shortage requests.</div></div>`;

      }

      const selectedDate = appState.selectedDate;
      const selectedWardFilter = appState.selectedRelievingWardId || "";

      const { data, error } = await sb.rpc("get_relieving_pool_requests_safe", {
        p_start_date:selectedDate,
        p_end_date:selectedDate,
        p_ward_id:null
      });

      if(error) throw error;
      const allRows = data || [];
      const rows = selectedWardFilter ? allRows.filter(r => String(rowField(r,["ward_id"],"")) === String(selectedWardFilter)) : allRows;
      const activeRows = allRows.filter(r => !rpIsDone(r));
      const unseenRows = allRows.filter(r => !rowField(r,["allocation_sent_at", "allocated_at", "sno_seen_at", "reviewed_at", "seen_at"]) && !rpIsDone(r));
      const verificationRows = allRows.filter(r => rowNumber(r,["verification_call_count", "verification_calls"]) > 0 && !rpIsDone(r));

      document.getElementById("content").innerHTML = `
        <div class="card rp-v8-top">
          <div class="rp-v8-title-row"><h2>Relieving Pool Requests</h2></div>
          ${renderRelievingPoolAllocationSummary(allRows)}
        </div>

        <div class="rp-v8-stats">
          ${statCard(allRows.length,"Requests")}
          ${statCard(activeRows.length,"Action required")}
          ${statCard(unseenRows.length,"Not seen")}
          ${statCard(verificationRows.length,"Verification calls")}
          ${statCard(allRows.filter(r=>rpIsDone(r)).length,"Done / closed")}
        </div>

        <div class="rp-v8-list">
          ${rows.map(r=>renderRelievingPoolRequestCard(r)).join("") || `<div class="card"><p class="muted">No relieving pool requests found for the selected date/ward.</p></div>`}
        </div>`;
    }

    function rowField(row, keys, fallback=null){
      for(const key of keys){
        if(Object.prototype.hasOwnProperty.call(row || {}, key) && row[key] !== null && row[key] !== undefined) return row[key];
      }
      return fallback;
    }

    function rowNumber(row, keys){ return numberValue(rowField(row, keys, 0)); }
    function rowDateTime(row, keys){ return formatDateTime(rowField(row, keys, null)) || "—"; }

    function rpIsDone(r){
      const status = String(rowField(r,["request_status","status"],"open") || "open");
      return !!rowField(r,["case_closed_at","closed_at","completed_at"]) || ["closed","filled","completed","cancelled"].includes(status);
    }

    function rpIsCovered(r){
      const status = String(rowField(r,["request_status","status"],"open") || "open");
      return !!rowField(r,["ward_covered_at","covered_at"]) || !!rowField(r,["case_closed_at","closed_at","completed_at"]) || ["ward_covered","filled","closed","completed"].includes(status);
    }

    function rpWardRows(rows, wardId){
      return (rows || []).filter(r => String(rowField(r,["ward_id"],"")) === String(wardId));
    }

    function renderRelievingPoolWardStrip(allRows, selectedWardId){
      const wards = appState.wards || [];
      const chips = wards.map(w => {
        const wid = w.ward_id || w.id;
        const wardRows = rpWardRows(allRows, wid);
        const active = wardRows.filter(r => !rpIsDone(r));
        const unseen = active.filter(r => !rowField(r,["sno_seen_at", "reviewed_at", "seen_at"]));
        const covered = wardRows.length && wardRows.every(r => rpIsCovered(r));
        const calls = active.reduce((sum,r)=>sum + rowNumber(r,["verification_call_count", "verification_calls"]), 0);
        let cls = "rp-v8-ward-chip idle";
        let small = "No open case";
        if(covered){ cls = "rp-v8-ward-chip done"; small = "Covered / done"; }
        else if(active.length){ cls = unseen.length ? "rp-v8-ward-chip urgent" : calls ? "rp-v8-ward-chip warning" : "rp-v8-ward-chip active"; small = unseen.length ? `${unseen.length} not seen` : calls ? `${calls} verification call${calls===1?"":"s"}` : `${active.length} active`; }
        if(String(wid) === String(selectedWardId)) cls += " selected";
        return `<button type="button" class="${cls}" onclick="setSelectedRelievingWard('${escapeHtml(wid)}')"><strong>${escapeHtml(w.ward_code)}</strong><span>${escapeHtml(small)}</span></button>`;
      }).join("");
      const selectedAll = selectedWardId ? "" : " selected";
      return `<div class="rp-v8-ward-strip">
          <button type="button" class="rp-v8-ward-chip all${selectedAll}" onclick="setSelectedRelievingWard('')"><strong>All</strong><span>Show all wards</span></button>
          ${chips}
        </div>`;
    }

    function renderRelievingPoolAllocationSummary(allRows){
      const wards = appState.wards || [];
      const totals = wards.map(w => {
        const wid = w.ward_id || w.id;
        const wardRows = rpWardRows(allRows, wid);
        const active = wardRows.filter(r => !rpIsDone(r));
        const needN = active.reduce((sum,r)=>sum + rowNumber(r,["nurses_needed", "nurse_shortage", "required_nurses_shortage"]),0);
        const needC = active.reduce((sum,r)=>sum + rowNumber(r,["carers_needed", "carer_shortage", "carers_shortage"]),0);
        const needA = active.reduce((sum,r)=>sum + rowNumber(r,["nursing_aides_needed", "healthcare_assistants_needed", "hcas_needed", "aides_needed", "healthcare_assistant_shortage"]),0);
        const sentN = active.reduce((sum,r)=>sum + rowNumber(r,["nurses_allocated", "allocated_nurses"]),0);
        const sentC = active.reduce((sum,r)=>sum + rowNumber(r,["carers_allocated", "allocated_carers"]),0);
        const sentA = active.reduce((sum,r)=>sum + rowNumber(r,["nursing_aides_allocated", "healthcare_assistants_allocated", "hcas_allocated", "aides_allocated", "allocated_aides"]),0);
        const needTotal = needN + needC + needA;
        const sentTotal = sentN + sentC + sentA;
        const outstanding = Math.max(0, needTotal - sentTotal);
        const unseen = active.filter(r => !rowField(r,["allocation_sent_at", "allocated_at", "sno_seen_at", "reviewed_at", "seen_at"])).length;
        const calls = active.reduce((sum,r)=>sum + rowNumber(r,["verification_call_count", "verification_calls"]),0);
        const covered = active.length && active.every(r => rpIsCovered(r));
        return { ward:w, wid, active, needN, needC, needA, sentN, sentC, sentA, needTotal, sentTotal, outstanding, unseen, calls, covered };
      });

      const totalNeed = totals.reduce((sum,x)=>sum + x.needTotal,0);
      const totalSent = totals.reduce((sum,x)=>sum + x.sentTotal,0);
      const totalOutstanding = totals.reduce((sum,x)=>sum + x.outstanding,0);

      return `
        <div class="rp-v10-summary">
          <div class="rp-v10-summary-head rp-v12-summary-head">
            <div class="rp-v13-control-sentence">
              <span>Date</span>
              <input type="date" value="${appState.selectedDate}" onchange="setSelectedDate(this.value)">
              <span>Ward</span>
              ${relievingWardSelectorHtml()}
              <button class="secondary small" type="button" onclick="changeSelectedDateDays(-1)">← Previous</button>
              <button class="secondary small" type="button" onclick="setSelectedDate(todayISO())">Today</button>
              <button class="secondary small" type="button" onclick="changeSelectedDateDays(1)">Next →</button>
            </div>
            <div class="rp-v10-total ${totalOutstanding ? "warn" : "ok"}">
              <span>Outstanding</span>
              <strong>${totalOutstanding}</strong>
              <small>Needed ${totalNeed} · Sent ${totalSent}</small>
            </div>
          </div>
          <div class="rp-v10-ward-summary-grid">
            ${totals.map(x => {
              const code = x.ward.ward_code || "Ward";
              const cls = x.outstanding ? (x.unseen ? "urgent" : x.calls ? "warning" : "active") : (x.active.length || x.covered ? "done" : "idle");
              const status = x.outstanding ? `${x.outstanding} short` : (x.active.length || x.covered ? "covered" : "no request");
              return `<button type="button" class="rp-v10-summary-chip ${cls}" onclick="setSelectedRelievingWard('${escapeHtml(x.wid)}')">
                <div class="rp-v10-chip-top"><strong>${escapeHtml(code)}</strong><span>${escapeHtml(status)}</span></div>
                <div class="rp-v10-chip-line">Need <b>${x.needTotal}</b> · Sent <b>${x.sentTotal}</b></div>
                <div class="rp-v10-chip-line small">N ${x.needN}/${x.sentN} · C ${x.needC}/${x.sentC} · A ${x.needA}/${x.sentA}</div>
              </button>`;
            }).join("")}
          </div>
        </div>`;
    }

    function verificationEventsFromRow(r){
      const raw = rowField(r,["verification_events", "verification_log", "verification_calls_log"], []);
      if(Array.isArray(raw)) return raw;
      if(typeof raw === "string"){
        try{ const parsed = JSON.parse(raw); return Array.isArray(parsed) ? parsed : []; }catch(e){ return []; }
      }
      return [];
    }

    function verificationTone(count){
      if(count >= 3) return "danger";
      if(count === 2) return "orange";
      if(count === 1) return "amber";
      return "secondary";
    }

    function renderVerificationCallPills(r){
      const events = verificationEventsFromRow(r).slice().reverse();
      if(!events.length) return `<div class="rp-v8-call-row"><span class="rp-v8-step">No verification calls yet</span></div>`;
      return `<div class="rp-v8-call-row">${events.map((e, idx) => {
        const ts = shortDateTime(e.created_at || e.timestamp || e.event_at) || "—";
        const outcome = e.event_outcome || e.outcome || "verification_call";
        const note = e.notes || e.note || "Verification call logged.";
        const pillClass = outcome === "fully_arrived" ? "green" : (idx >= 2 ? "red" : "");
        return `<span class="rp-v8-call-pill ${pillClass}">Call ${idx+1}: ${escapeHtml(ts)}<small>${escapeHtml(labelVerificationOutcome(outcome))}${note ? ` · ${escapeHtml(note)}` : ""}</small></span>`;
      }).join("")}</div>`;
    }

    function shortDateTime(value){
      if(!value) return "";
      const d = new Date(value);
      if(Number.isNaN(d.getTime())) return String(value);
      const dd = String(d.getDate()).padStart(2,"0");
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const hh = String(d.getHours()).padStart(2,"0");
      const mi = String(d.getMinutes()).padStart(2,"0");
      return `${dd}/${mm} ${hh}:${mi}`;
    }

    function renderRelievingPoolAuditTrail(r){
      const events = verificationEventsFromRow(r);
      const requestSentAt = rowField(r, ["requested_at", "request_sent_at", "created_at"]);
      const fallbackSentAt = rowField(r, ["fallback_email_sent_at", "fallback_sent_at"]);
      const fallbackEmail = rowField(r, ["fallback_recipient_email", "fallback_email", "nurse_in_charge_email"], "");
      const allocatedAt = rowField(r, ["allocation_sent_at", "allocated_at"]);
      const allocatedBy = rowField(r, ["allocated_by_name", "allocated_by", "sent_by_name"], "");
      const callCount = events.length || rowNumber(r, ["verification_call_count", "verification_calls"]);
      const latestCallAt = rowField(r,["latest_verification_at", "verified_at"]);
      const closedAt = rowField(r, ["case_closed_at", "closed_at", "ward_covered_at", "covered_at"]);
      const closedBy = rowField(r, ["closed_by_name", "ward_covered_by_name", "verified_by_name"], "");

      const steps = [
        {label:"Requested", time:requestSentAt, cls:requestSentAt ? "done" : "", small:"Ward request created"},
        {label:"Email sent", time:fallbackSentAt, cls:fallbackSentAt ? "done" : "", small:fallbackEmail ? `To: ${fallbackEmail}` : "—"},
        {label:"Staff sent", time:allocatedAt, cls:allocatedAt ? "done" : "active", small:allocatedBy || "—"},
        {label:"Verification calls", time:latestCallAt, cls:callCount >= 3 ? "danger" : callCount ? "warn" : "", small:callCount ? `${callCount} call${callCount===1?"":"s"}` : "—"},
        {label:"Closed", time:closedAt, cls:closedAt ? "done" : "", small:closedBy || "—"}
      ];

      return `<div class="rp-v13-audit">${steps.map(s=>`
        <div class="rp-v13-audit-step ${s.cls}">
          <span class="rp-v13-audit-label">${escapeHtml(s.label)}</span>
          <span class="rp-v13-audit-time">${escapeHtml(shortDateTime(s.time) || "—")}</span>
          <span class="rp-v13-audit-small">${escapeHtml(s.small || "—")}</span>
        </div>`).join("")}</div>${renderVerificationCallPills(r)}`;
    }

    function labelVerificationOutcome(value){
      const v = String(value || "").toLowerCase();
      const labels = {
        not_arrived: "Staff not arrived yet",
        partially_arrived: "Partially arrived",
        fully_arrived: "Fully arrived",
        no_answer: "No answer from ward",
        verification_call: "Verification call"
      };
      return labels[v] || value || "Verification call";
    }

    function renderRelievingPoolRequestCard(r){
      const requestId = rowField(r, ["request_id", "id"]);
      const key = safeKey(requestId);
      const status = String(rowField(r, ["request_status", "status"], "open") || "open");
      const nursesNeeded = rowNumber(r, ["nurses_needed", "nurse_shortage", "required_nurses_shortage"]);
      const carersNeeded = rowNumber(r, ["carers_needed", "carer_shortage", "carers_shortage"]);
      const aidesNeeded = rowNumber(r, ["nursing_aides_needed", "healthcare_assistants_needed", "hcas_needed", "aides_needed", "healthcare_assistant_shortage"]);
      const nursesAllocated = rowNumber(r, ["nurses_allocated", "allocated_nurses"]);
      const carersAllocated = rowNumber(r, ["carers_allocated", "allocated_carers"]);
      const aidesAllocated = rowNumber(r, ["nursing_aides_allocated", "healthcare_assistants_allocated", "hcas_allocated", "aides_allocated", "allocated_aides"]);
      const neededTotal = nursesNeeded + carersNeeded + aidesNeeded;
      const allocatedTotal = nursesAllocated + carersAllocated + aidesAllocated;
      const shortage = Math.max(0, neededTotal - allocatedTotal);
      const allocatedAt = rowField(r, ["allocation_sent_at", "allocated_at"]);
      const closedAt = rowField(r, ["case_closed_at", "closed_at", "ward_covered_at", "covered_at"]);
      const verificationCount = rowNumber(r, ["verification_call_count", "verification_calls"]);
      const source = rowField(r, ["request_source", "source_type", "source"], "Daily Staffing");
      const fallbackEmail = rowField(r, ["fallback_recipient_email", "fallback_email", "nurse_in_charge_email"], "");
      const fallbackSentAt = rowField(r, ["fallback_email_sent_at", "fallback_sent_at"]);
      const fallbackButtonClass = fallbackSentAt ? "success" : "amber";
      const fallbackButtonText = fallbackSentAt ? "Email sent / send again" : "Send email";
      const fallbackStatusHtml = fallbackSentAt
        ? `<div class="rp-v11-email-sent">Email sent: ${escapeHtml(shortDateTime(fallbackSentAt))}${fallbackEmail ? ` · ${escapeHtml(fallbackEmail)}` : ""}</div>`
        : `<div class="rp-v11-email-pending">No fallback email sent.</div>`;
      const verifyClass = verificationTone(verificationCount);
      const verifyButton = verificationCount ? `Log call #${verificationCount + 1}` : "Log verification call";

      return `
        <div class="rp-v8-card">
          <div class="rp-v8-card-head">
            <div>
              <div class="rp-v8-card-title">${escapeHtml(rowField(r,["ward_code"],"Ward"))} — ${escapeHtml(rowField(r,["ward_name"],""))}</div>
              <div class="rp-v8-card-sub">${escapeHtml(formatDate(rowField(r,["request_date"], appState.selectedDate)))} · ${escapeHtml(rowField(r,["reason"],"Relieving pool request"))} · Source: ${escapeHtml(source)}</div>
            </div>
            <div>${statusBadge(status)}</div>
          </div>
          <div class="rp-v8-grid">
            <div class="rp-v8-box">
              <div class="rp-v8-box-title">Need / shortage</div>
              <div class="rp-v8-mini-metrics">
                <span><b>${nursesNeeded}</b> nurses</span>
                <span><b>${carersNeeded}</b> carers</span>
                <span><b>${aidesNeeded}</b> aides</span>
              </div>
              <div class="rp-v8-shortage ${shortage ? "warn" : "ok"}">${shortage ? `Still short by ${shortage}` : "Need covered"}</div>
              <details class="rp-v8-fallback" ${fallbackSentAt ? "open" : ""}>
                <summary>No charge nurse? Email nurse in charge</summary>
                <div class="rp-v8-fallback-grid">
                  <input id="fallbackEmail_${key}" type="email" value="${escapeHtml(fallbackEmail)}" placeholder="nurse.in.charge@gov.mt">
                  <button class="${fallbackButtonClass} small" type="button" onclick="sendRelievingPoolWardUpdateEmail('${escapeHtml(requestId)}','${key}')">${escapeHtml(fallbackButtonText)}</button>
                </div>
                ${fallbackStatusHtml}
              </details>
            </div>

            <div class="rp-v8-box">
              <div class="rp-v8-box-title">Allocate staff</div>
              <div class="rp-v8-alloc-grid">
                <div><label>Nurses</label><input id="nurses_${key}" type="number" min="0" value="${nursesAllocated}"></div>
                <div><label>Carers</label><input id="carers_${key}" type="number" min="0" value="${carersAllocated}"></div>
                <div><label>Aides</label><input id="hcas_${key}" type="number" min="0" value="${aidesAllocated}"></div>
              </div>
              <div class="rp-v13-close-actions">
                <button class="${closedAt ? "success" : "primary"} small wide" type="button" onclick="closeRelievingPoolEvent('${escapeHtml(requestId)}','${key}')">${closedAt ? "Event closed" : "Close event"}</button>
                <button class="danger small wide" type="button" onclick="resetRelievingPoolAllocation('${escapeHtml(requestId)}')">Reset</button>
              </div>
            </div>

            <div class="rp-v8-box">
              <div class="rp-v8-box-title">Workflow actions</div>
              <div class="rp-v13-workflow-one">
                <button class="${allocatedAt ? "success" : "secondary"} small" type="button" onclick="allocateRelievingPoolRequest('${escapeHtml(requestId)}','${key}')">${allocatedAt ? "Staff sent recorded" : "Staff sent"}</button>
                <button class="${verifyClass} small" type="button" onclick="logRelievingPoolVerificationCall('${escapeHtml(requestId)}','${key}')">${escapeHtml(verifyButton)}</button>
              </div>
            </div>

            <div class="rp-v8-box rp-v8-audit-full">
              <div class="rp-v8-box-title">AUDIT TRAIL — STEP BY STEP</div>
              ${renderRelievingPoolAuditTrail(r)}
            </div>
          </div>
        </div>`;
    }

    function rpAction(title, help, buttonLabel, onclick, done=false){
      return `
        <div class="rp-action-row">
          <div>
            <div class="rp-action-title">${escapeHtml(title)}</div>
            <div class="rp-action-help">${escapeHtml(help)}</div>
          </div>
          <button class="${done ? "success" : "secondary"} small" type="button" onclick="${onclick}">${escapeHtml(done ? "Done" : buttonLabel)}</button>
        </div>`;
    }

    function rpStep(label, done, current){
      return `<div class="rp-step ${done ? "done" : current ? "current" : ""}"><div class="dot"></div><div class="rp-step-label">${escapeHtml(label)}</div></div>`;
    }


    async function sendRelievingPoolWardUpdateEmail(requestId, key){
      clearMessage();
      const recipient = document.getElementById(`fallbackEmail_${key}`)?.value?.trim() || null;
      const notes = null;
      if(!recipient){ showError("Enter the nurse-in-charge email address before sending the fallback request."); return; }
      const { error } = await sb.rpc("send_relieving_pool_ward_update_email", {
        p_request_id: requestId,
        p_recipient_email: recipient,
        p_notes: notes
      });
      if(error){ showError(error.message); return; }
      showSuccess("Fallback email timestamp recorded for the nurse in charge.");
      await renderRelievingPool();
    }

    async function markRelievingPoolSeen(requestId){
      clearMessage();
      const { error } = await sb.rpc("mark_relieving_pool_seen_by_sno", { p_request_id: requestId });
      if(error){ showError(error.message); return; }
      showSuccess("Seen by SNO timestamp recorded.");
      await renderRelievingPool();
    }

    async function allocateRelievingPoolRequest(requestId, key){
      clearMessage();
      const nurses = Number(document.getElementById(`nurses_${key}`).value || 0);
      const carers = Number(document.getElementById(`carers_${key}`).value || 0);
      const hcas = Number(document.getElementById(`hcas_${key}`).value || 0);
      const notes = "Staff sent by SNO.";
      const { error } = await sb.rpc("allocate_relieving_pool_request", {
        p_request_id:requestId,
        p_nurses_allocated:nurses,
        p_carers_allocated:carers,
        p_healthcare_assistants_allocated:hcas,
        p_allocation_notes:notes
      });
      if(error){ showError(error.message); return; }
      showSuccess("Staff sent timestamp recorded.");
      await renderRelievingPool();
    }

    async function logRelievingPoolVerificationCall(requestId, key){
      clearMessage();
      const notes = "Verification call logged by SNO.";
      const outcome = "verification_call";
      const { error } = await sb.rpc("log_relieving_pool_verification_call", {
        p_request_id: requestId,
        p_outcome: outcome,
        p_notes: notes
      });
      if(error){ showError(error.message); return; }
      showSuccess("Verification call timestamp recorded.");
      await renderRelievingPool();
     }

    async function closeRelievingPoolEvent(requestId, key){
      clearMessage();
      const nurses = Number(document.getElementById(`nurses_${key}`)?.value || 0);
      const carers = Number(document.getElementById(`carers_${key}`)?.value || 0);
      const hcas = Number(document.getElementById(`hcas_${key}`)?.value || 0);

      const allocation = await sb.rpc("allocate_relieving_pool_request", {
        p_request_id:requestId,
        p_nurses_allocated:nurses,
        p_carers_allocated:carers,
        p_healthcare_assistants_allocated:hcas,
        p_allocation_notes:"Event closed by SNO."
      });
      if(allocation.error){ showError(allocation.error.message); return; }

      const closeResult = await sb.rpc("close_relieving_pool_case", {
        p_request_id: requestId,
        p_notes: "Event closed by SNO."
      });
      if(closeResult.error){ showError(closeResult.error.message); return; }
      showSuccess("Event closed.");
      await renderRelievingPool();
    }

    async function closeRelievingPoolCase(requestId, key){
      clearMessage();
      const { error } = await sb.rpc("close_relieving_pool_case", {
        p_request_id: requestId,
        p_notes: "Event closed by SNO."
      });
      if(error){ showError(error.message); return; }
      showSuccess("Event closed.");
      await renderRelievingPool();
    }

    async function verifyRelievingPoolRequest(requestId, key=""){
      return logRelievingPoolVerificationCall(requestId, key);
    }

    async function resetRelievingPoolAllocation(requestId){
      clearMessage();
      const confirmed = window.confirm("Reset this relieving pool event? This clears staff sent, email fallback, verification calls, closure and audit entries for this case.");
      if(!confirmed) return;

      const { error } = await sb.rpc("reset_relieving_pool_allocation", {
        p_request_id:requestId,
        p_reset_notes:"Reset by SNO."
      });

      if(error){ showError(error.message); return; }
      showSuccess("Relieving pool event reset.");
      await renderRelievingPool();
    }

    async function updatePassword(){
      clearMessage();
      const p1=document.getElementById("newPassword").value;
      const p2=document.getElementById("confirmPassword").value;
      if(!p1 || p1.length<6){ showError("Password must be at least 6 characters."); return; }
      if(p1!==p2){ showError("Passwords do not match."); return; }
      const { error } = await sb.auth.updateUser({ password:p1 });
      if(error){ showError(error.message); return; }
      showSuccess("Password updated successfully.");
      document.getElementById("newPassword").value="";
      document.getElementById("confirmPassword").value="";
    }

    function rosterPatterns(){
      const builtIns = [
        { pattern_code:"DDO", pattern_name:"Day Day Off — repeat" },
        { pattern_code:"DDOO", pattern_name:"Day Day Off Off — repeat" },
        { pattern_code:"DODO", pattern_name:"Day Off Day Off — repeat" },
        { pattern_code:"NNOO", pattern_name:"Night Night Off Off — repeat" },
        { pattern_code:"NONO", pattern_name:"Night Off Night Off — repeat" },
        { pattern_code:"NNNOO", pattern_name:"Night Night Night Off Off — repeat" }
      ];

      const fromRef = appState.ref?.roster_patterns || [];
      const map = new Map();
      for(const p of builtIns) map.set(patternCode(p), p);
      for(const p of fromRef){
        const code = patternCode(p);
        if(["DDO","DDOO","DODO","NNOO","NONO","NNNOO"].includes(code)) map.set(code, p);
      }
      return Array.from(map.values());
    }

    function normalizeSeries(rows, labelKey="label", valueKey="value"){
      return (rows || []).map(r => {
        const label = r[labelKey] ?? r.label ?? r.action_type ?? r.table_name ?? r.ward_code ?? r.changed_by_name ?? r.staff_name ?? r.shift_code ?? r.duty_type ?? "Unknown";
        const value = Number(r[valueKey] ?? r.value ?? r.total_count ?? r.requests ?? 0);

      }).filter(x => x.value !== 0);

    function barArrayCard(title, subtitle, rows){
      const entries = normalizeSeries(rows).sort((a,b)=>b.value-a.value).slice(0,10);
      const max = entries.length ? Math.max(...entries.map(e=>e.value)) : 1;

      return `
        <div class="chart-card">
          <div class="chart-title">${escapeHtml(title)}</div>
          <div class="chart-subtitle">${escapeHtml(subtitle || "")}</div>
          <div class="bar-list">
            ${entries.map(e => `
              <div class="bar-row">
                <div class="bar-label" title="${escapeHtml(e.label)}">${escapeHtml(e.label)}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${Math.max(4, Math.round((e.value/max)*100))}%"></div></div>
                <div class="bar-value">${e.value}</div>
              </div>
            `).join("") || `<p class="muted">No data for this period.</p>`}
          </div>
        </div>`;
    }

    function donutCard(title, subtitle, rows){
      const entries = normalizeSeries(rows).sort((a,b)=>b.value-a.value).slice(0,6);
      const total = entries.reduce((sum,e)=>sum+e.value,0);
      const palette = ["var(--primary)","var(--green)","var(--amber)","var(--purple)","var(--red)","var(--grey)"];
      let cursor = 0;
      const segments = entries.map((e,i)=>{
        const start = total ? cursor/total*360 : 0;
        cursor += e.value;
        const stop = total ? cursor/total*360 : 0;
        return `${palette[i%palette.length]} ${start}deg ${stop}deg`;
      }).join(",");

      return `
        <div class="chart-card">
          <div class="chart-title">${escapeHtml(title)}</div>
          <div class="chart-subtitle">${escapeHtml(subtitle || "")}</div>
          <div class="donut-wrap">
            <div class="donut" style="${segments ? `background:conic-gradient(${segments})` : ""}"></div>
            <div class="legend-list">
              ${entries.map((e,i)=>`
                <div class="legend-item">
                  <span><span class="legend-dot" style="background:${palette[i%palette.length]}"></span>${escapeHtml(e.label)}</span>
                  <strong>${e.value}</strong>
                </div>
              `).join("") || `<p class="muted">No data.</p>`}
            </div>
          </div>
        </div>`;
    }

    function lineChartCard(title, subtitle, rows){
      const series = (rows || []).map(r => ({
        label:String(r.date || r.audit_date || r.trend_date || r.month || ""),
        value:Number(r.value ?? r.total_count ?? 0)
      })).filter(x => x.label);

      const width = 640, height = 150, pad = 18;
      const max = Math.max(1, ...series.map(x=>x.value));
      const count = Math.max(1, series.length - 1);
      const points = series.map((x,i)=>{
        const px = pad + (i/count) * (width - pad*2);
        const py = height - pad - (x.value/max) * (height - pad*2);
        return `${px.toFixed(1)},${py.toFixed(1)}`;
      }).join(" ");

      return `
        <div class="chart-card">
          <div class="chart-title">${escapeHtml(title)}</div>
          <div class="chart-subtitle">${escapeHtml(subtitle || "")}</div>
          <svg class="line-chart" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none">
            <line x1="${pad}" y1="${height-pad}" x2="${width-pad}" y2="${height-pad}" stroke="#dce5ee" stroke-width="2"/>
            <line x1="${pad}" y1="${pad}" x2="${pad}" y2="${height-pad}" stroke="#dce5ee" stroke-width="2"/>
            ${series.length ? `<polyline fill="none" stroke="var(--primary)" stroke-width="4" points="${points}"/>` : ""}
            ${series.map((x,i)=>{
              const px = pad + (i/count) * (width - pad*2);
              const py = height - pad - (x.value/max) * (height - pad*2);
              return `<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="4" fill="var(--primary)"><title>${escapeHtml(x.label)}: ${x.value}</title></circle>`;
            }).join("")}
          </svg>
          <div class="actions" style="justify-content:space-between;margin-top:8px">
            <span class="muted">${escapeHtml(series[0]?.label || "")}</span>
            <strong>${series.reduce((s,x)=>s+x.value,0)} total</strong>
            <span class="muted">${escapeHtml(series.at(-1)?.label || "")}</span>
          </div>
        </div>`;
    }
