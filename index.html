                  <tr>
                    <td>${escapeHtml(formatDate(r.date))}</td>
                    <td><strong>${escapeHtml(r.ward_code || "—")}</strong></td>
                    <td>${numberValue(r.sick_leave)}</td>
                    <td>${numberValue(r.leave_other)}</td>
                    <td><strong>${total}</strong></td>
                    <td><div class="bar-track"><div class="bar-fill" style="width:${width}%"></div></div></td>
                  </tr>
                `;}).join("") || `<tr><td colspan="6" class="muted">No heatmap data for this period.</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>`;
    }

    function shiftStatusCard(rows){
      const mapped = (rows || []).map(r => ({
        label:`${r.shift_code || "?"} — ${r.shift_name || r.shift_category || ""}`,
        value:r.total_count || 0
      }));
      return barArrayCard("Shift/status mix", "Counts by recorded shift/status from daily staffing submissions.", mapped);
    }

    function relievingWardCard(rows){
      return `
        <div class="chart-card">
          <div class="chart-title">Relieving pool by ward</div>
          <div class="chart-subtitle">Requests, staffing need and staffing allocated.</div>
          <div class="table-wrap">
            <table class="mini-table">
              <thead><tr><th>Ward</th><th>Requests</th><th>Nurses need/sent</th><th>Support need/sent</th></tr></thead>
              <tbody>
                ${(rows || []).map(r=>`
                  <tr>
                    <td><strong>${escapeHtml(r.ward_code)}</strong></td>
                    <td>${numberValue(r.requests)}</td>
                    <td>${numberValue(r.nurses_needed)} / ${numberValue(r.nurses_allocated)}</td>
                    <td>${numberValue(r.support_needed)} / ${numberValue(r.support_allocated)}</td>
                  </tr>
                `).join("") || `<tr><td colspan="4" class="muted">No relieving pool data.</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>`;
    }

    
    function barCard(title, counts){
      const entries = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8);
      const max = entries.length ? Math.max(...entries.map(e=>e[1])) : 1;

      return `
        <div class="card">
          <h3>${escapeHtml(title)}</h3>
          <div class="bar-list">
            ${entries.map(([label,value]) => `
              <div class="bar-row">
                <div class="bar-label" title="${escapeHtml(label)}">${escapeHtml(label)}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${Math.max(3, Math.round((value/max)*100))}%"></div></div>
                <div class="bar-value">${value}</div>
              </div>
            `).join("") || `<p class="muted">No data.</p>`}
          </div>
        </div>`;
    }

    function countBy(rows, fn){
      const out = {};
      for(const row of rows){
        const key = String(fn(row) || "Unknown");
        out[key] = (out[key] || 0) + 1;
      }
      return out;
    }

    function badge(text,colour){ return `<span class="badge ${colour}">${escapeHtml(text)}</span>`; }

    function wardStatusBadge(status){
      if(status==="fully_staffed")return badge("Fully staffed","green");
      if(status==="short_staffed")return badge("Short staffed","red");
      if(status==="not_submitted")return badge("Not submitted","amber");
      return badge(status||"Unknown","grey");
    }

    function statusBadge(status){
      if(status==="open")return badge("Open","amber");
      if(status==="reviewed")return badge("Seen by SNO","blue");
      if(status==="allocation_sent")return badge("Staff sent","blue");
      if(status==="verification_in_progress")return badge("Verification","purple");
      if(status==="partially_filled")return badge("Partially filled","purple");
      if(status==="ward_covered")return badge("Ward covered","green");
      if(status==="filled")return badge("Filled","green");
      if(status==="closed")return badge("Closed","green");
      if(status==="cancelled")return badge("Cancelled","grey");
      return badge(status||"Unknown","grey");
    }


    function displayShiftCode(code){
      const clean = normaliseRosterCode(code);
      return clean || "—";
    }

    function isLongLeaveCandidateCode(code){
      const clean = normaliseRosterCode(code);
      return ["L", "TI", "TO", "OT", "LL"].includes(clean);
    }

    function addDaysIso(isoDate, delta){
      const parts = String(isoDate || "").split("-").map(Number);
      if(parts.length !== 3 || parts.some(n => !Number.isFinite(n))) return "";
      const d = new Date(parts[0], parts[1] - 1, parts[2]);
      d.setDate(d.getDate() + delta);
      return isoFromDate(d);
    }

    function rosterCodeForLongLeaveCheck(daysMap, isoDate){
      const row = daysMap?.[isoDate];
      return normaliseRosterCode(row?.live_shift_code || "");
    }

    function longLeaveDisplayCode(daysMap, isoDate, actualCode){
      const cleanActual = normaliseRosterCode(actualCode);
      if(cleanActual === "LL") return "LL";
      if(!isLongLeaveCandidateCode(cleanActual)) return cleanActual;

      let blockLength = 1;
      let cursor = addDaysIso(isoDate, -1);
      while(cursor && isLongLeaveCandidateCode(rosterCodeForLongLeaveCheck(daysMap, cursor))){
        blockLength += 1;
        cursor = addDaysIso(cursor, -1);
      }

      cursor = addDaysIso(isoDate, 1);
      while(cursor && isLongLeaveCandidateCode(rosterCodeForLongLeaveCheck(daysMap, cursor))){
        blockLength += 1;
        cursor = addDaysIso(cursor, 1);
      }

      return blockLength >= 3 ? "LL" : cleanActual;
    }

    function shiftLabel(code){
      const labels = {
        D:"Day", N:"Night", O:"Off", R:"Rest", L:"Leave", AL:"Leave", SL:"Sick Leave", ML:"Maternity", ST:"Study",
        TI:"TIL In", TO:"TIL Out", OT:"Overtime", LL:"Long Leave", M:"Morning", E:"Evening"
      };
      const clean = normaliseRosterCode(code);
      return labels[clean] || clean || "";
    }

    function shiftBadge(code){
      const cleanCode = normaliseRosterCode(code || "");
      if(!cleanCode) return `<span class="shift-cell shift-O">—</span>`;
      return `<span class="shift-cell shift-${escapeHtml(cleanCode)}" title="${escapeHtml(displayShiftCode(cleanCode))} — ${escapeHtml(shiftLabel(cleanCode))}">${escapeHtml(displayShiftCode(cleanCode))}</span>`;
    }

    function shiftButton(staffId, shiftDate, code, isOverride, actualCode=null){
      const cleanCode = normaliseRosterCode(code || actualCode || "");
      const visualCode = cleanCode || "O";
      const storedCode = normaliseRosterCode(actualCode || code || "");
      return `
        <button type="button" class="shift-cell shift-${escapeHtml(visualCode)}" onclick="editRosterShift('${escapeHtml(staffId)}','${escapeHtml(shiftDate)}','${escapeHtml(storedCode)}')" title="Click to update: ${escapeHtml(displayShiftCode(visualCode))} — ${escapeHtml(shiftLabel(visualCode))}">
          ${escapeHtml(displayShiftCode(visualCode))}
        </button>
        ${isOverride ? `<span class="override-dot" title="Changed from baseline"></span>` : ""}
      `;
    }

    function legend(code,label){ return `<span>${shiftBadge(code)} <span class="muted">${escapeHtml(label)}</span></span>`; }
    function showError(message){ document.getElementById("message").innerHTML=`<div class="error">${escapeHtml(message)}</div>`; }
    function showSuccess(message){ document.getElementById("message").innerHTML=`<div class="success-msg">${escapeHtml(message)}</div>`; }
    function clearMessage(){ document.getElementById("message").innerHTML=""; }
    function setLoginMessage(html){ document.getElementById("loginMessage").innerHTML=html; }

    function groupRosterByStaff(rows){
      const map=new Map();

      for(const row of rows){
        if(!map.has(row.staff_id)){
          map.set(row.staff_id,{
            staff_id:row.staff_id,
            full_name:row.full_name,
            role:row.role,
            roster_group:row.roster_group,
            roster_code:row.roster_code,
            roster_name:row.roster_name,
            roster_pattern_code:row.roster_pattern_code,
            days:{}
          });
        }
        map.get(row.staff_id).days[row.shift_date]=row;
      }

      return Array.from(map.values()).sort((a,b)=>{
        const roleDiff = roleSortOrder(a.role) - roleSortOrder(b.role);
        if(roleDiff !== 0) return roleDiff;
        return cleanStaffName(a.full_name).localeCompare(cleanStaffName(b.full_name));
      });
    }

    function monthRange(monthValue){
      const [year,month]=monthValue.split("-").map(Number);
      const startDate=new Date(year,month-1,1);
      const endDate=new Date(year,month,0);
      const days=[];
      const cursor=new Date(startDate);
      while(cursor<=endDate){days.push(new Date(cursor));cursor.setDate(cursor.getDate()+1);}
      return {start:isoFromDate(startDate),end:isoFromDate(endDate),days};
    }

    function cleanStaffName(name){
      return String(name || "")
        .replace(/^SW\d+\s+/i,"")
        .replace(/^SAU1\s+/i,"")
        .replace(/\s+/g," ")
        .trim();
    }

    function sundaysForMonth(monthValue){
      const { days } = monthRange(monthValue);
      return days.filter(d => d.getDay() === 0).map(d => isoFromDate(d));
    }

    function todayISO(){ return isoFromDate(new Date()); }
    function monthISO(date){ const y=date.getFullYear(); const m=String(date.getMonth()+1).padStart(2,"0"); return `${y}-${m}`; }
    function isoFromDate(date){ const y=date.getFullYear(); const m=String(date.getMonth()+1).padStart(2,"0"); const d=String(date.getDate()).padStart(2,"0"); return `${y}-${m}-${d}`; }
    function dateOnly(value){ if(!value) return ""; return String(value).slice(0,10); }
    function formatDate(value){ if(!value)return""; const [y,m,d]=String(value).split("-"); return `${d}/${m}/${y}`; }
    function formatDateTime(value){ if(!value)return""; const dt=new Date(value); return dt.toLocaleString("en-GB",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}); }
    function formatTime(value){ if(!value) return ""; return String(value).slice(0,5); }
    function weekdayShort(date){ return date.toLocaleDateString("en-GB",{weekday:"short"}); }
    function monthLabel(monthValue){
      const [y,m] = monthValue.split("-").map(Number);
      return new Date(y, m-1, 1).toLocaleDateString("en-GB",{month:"long",year:"numeric"});
    }

    function labelRole(role){
      const labels = {
        sno: "Senior Nursing Officer",
        charge_nurse: "Charge Nurse",
        senior_staff_nurse: "Senior Staff Nurse",
        nurse: "Staff Nurse",
        nursing_aide: "Nursing Aide",
        healthcare_assistant: "Nursing Aide",
        carer: "Carer"
      };
      return labels[role] || role || "";
    }

    function roleSortOrder(role){
      const order = {
        sno: 0,
        charge_nurse: 1,
        senior_staff_nurse: 2,
        nurse: 3,
        nursing_aide: 4,
        healthcare_assistant: 4,
        carer: 5
      };
      return order[role] ?? 99;
    }

    function entryTypeLabel(type){
      const labels={overtime:"Overtime",til_in:"TIL In",til_out:"TIL Out"};
      return labels[type] || type || "";
    }

    function extraEntryCode(type){
      if(type === "overtime") return "OT";
      if(type === "til_in") return "TI";
      if(type === "til_out") return "TO";
      return "";
    }

    function reasonForShift(code){
      const clean = normaliseRosterCode(code);
      const map = {
        AL:"annual_leave",
        L:"annual_leave",
        SL:"sick_leave",
        ML:"maternity_leave",
        ST:"study_leave",
        TI:"til_in",
        TO:"til_out",
        OT:"overtime",
        O:"off",
        R:"rest",
        D:"manual_day_change",
        N:"manual_night_change",
        M:"manual_morning_change",
        E:"manual_evening_change"
      };
      return map[clean] || "manual_roster_change";
    }

    function numberValue(value){ const n = Number(value); return Number.isFinite(n) ? n : 0; }
    function truthy(value){ return value === true || value === "true" || value === 1 || value === "1"; }
    function safeKey(value){ return String(value || "").replace(/[^a-zA-Z0-9]/g,"_"); }

    function escapeHtml(value){
      return String(value??"")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
  </script>
</body>
